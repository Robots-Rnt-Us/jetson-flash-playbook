<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Jetson SDK Manager phased workflow</title>
  <desc id="desc">Host downloads followed by regulated power, USB flashing cable, Recovery mode detection, flashing, then SSH optional packages.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="980" height="360" fill="url(#bg)" rx="16"/>
  <text x="40" y="58" fill="#e2e8f0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="600">
    Jetson AGX · SDK Manager playbook
  </text>
  <text x="40" y="90" fill="#94a3b8" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="16">
    Read left ’ right. Jetson sleeps until Phase&nbsp;2.
  </text>

  <!-- Phase cards -->
  <g filter="url(#soft)">
    <rect x="40" y="120" width="260" height="190" rx="18" fill="#172554" stroke="#1d4ed8" stroke-opacity="0.45"/>
    <text x="70" y="165" fill="#bfdbfe" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
      Phase&nbsp;1  Host only
    </text>
    <text x="70" y="198" fill="#e2e8f0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " SDK Manager launches
    </text>
    <text x="70" y="222" fill="#e2e8f0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " MultiGB downloads
    </text>
    <text x="70" y="246" fill="#e2e8f0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " APT / readiness probes
    </text>
    <text x="70" y="280" fill="#94a3b8" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="13" font-style="italic">
      Jetson can remain unplugged
    </text>
  </g>

  <g filter="url(#soft)">
    <rect x="360" y="120" width="260" height="190" rx="18" fill="#78350f" stroke="#ea580c" stroke-opacity="0.65"/>
    <text x="390" y="165" fill="#ffedd5" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
      Phase&nbsp;2  Wire + Recovery
    </text>
    <text x="390" y="198" fill="#fff7ed" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " Barrel power first
    </text>
    <text x="390" y="222" fill="#fff7ed" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " USBC flashing port/cable
    </text>
    <text x="390" y="246" fill="#fff7ed" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " Force Recovery ’ lsusb NVIDIA
    </text>
    <text x="390" y="280" fill="#fed7aa" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="13" font-style="italic">
      Bad cables = ghost failures
    </text>
  </g>

  <g filter="url(#soft)">
    <rect x="680" y="120" width="260" height="190" rx="18" fill="#14532d" stroke="#22c55e" stroke-opacity="0.65"/>
    <text x="710" y="165" fill="#dcfce7" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
      Phase&nbsp;3  Flash + boot
    </text>
    <text x="710" y="198" fill="#ecfccb" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " Imaging internal media
    </text>
    <text x="710" y="222" fill="#ecfccb" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " Reboot OEM / wizard
    </text>
    <text x="710" y="246" fill="#ecfccb" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="15">
      " Optional SSH packages
    </text>
    <text x="710" y="280" fill="#bbf7d0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="13" font-style="italic">
      Read summaries literally (skipped vs done)
    </text>
  </g>

  <line x1="300" y1="215" x2="350" y2="215" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)" stroke-linecap="round"/>
  <line x1="620" y1="215" x2="670" y2="215" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)" stroke-linecap="round"/>

  <text x="40" y="334" fill="#475569" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="13">
    RobotsRntUs · synced from wiki/ snapshot in playbook repo " CC BYSA&nbsp;4.0
  </text>
</svg>
